    <main id="main-content">
        <div style="max-width: 1200px; margin: 0 auto; padding: 0 8%;">
            <h1 style="text-align: center; color: var(--primary); margin-bottom: 50px; font-family: 'Playfair Display', serif; font-size: 3rem;">LOKACIJA I KONTAKT</h1>
            
            <div style="display: flex; flex-wrap: wrap; gap: 60px; justify-content: center;">
                <div style="flex: 1; min-width: 300px;">
                    <h2 style="color: var(--primary); margin-bottom: 20px;">Gdje smo?</h2>
                    <p style="margin-bottom: 20px;">Ulica Zadarskih Brijača 1, 23000 Zadar</p>
                    <div style="height: 350px; background: #222; border: 1px solid var(--primary); display: flex; align-items: center; justify-content: center; color: #888;">
                        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2864.547808195725!2d15.234362875884038!3d44.11332172255071!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4761fa649d8d1df3%3A0x96594ca0de6f596d!2sSveu%C4%8Dili%C5%A1te%20u%20Zadru%20-%20novi%20kampus%2C%20Ul.%20dr.%20Franje%20Tu%C4%91mana%2024i%2C%2023000%2C%20Zadar!5e0!3m2!1shr!2shr!4v1776590539772!5m2!1shr!2shr" 
                        width="420" 
                        height="200" 
                        style="border:0;" 
                        allowfullscreen="
                        " loading="lazy" 
                        referrerpolicy="no-referrer-when-downgrade"></iframe>
                    </div>
                </div>

                <div style="flex: 1; min-width: 300px;">
                    <h2 style="color: var(--primary); margin-bottom: 20px;">Pošaljite nam upit</h2>
                    <form action="#" method="POST" style="display: flex; flex-direction: column; gap: 20px;">
                        <div>
                            <label for="ime" style="display: block; margin-bottom: 8px;">Ime i prezime:</label>
                            <input type="text" id="ime" name="ime" required style="width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 4px;">
                        </div>
                        <div>
                            <label for="email" style="display: block; margin-bottom: 8px;">Vaš Email:</label>
                            <input type="email" id="email" name="email" required style="width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 4px;">
                        </div>
                        <div>
                            <label for="poruka" style="display: block; margin-bottom: 8px;">Poruka:</label>
                            <textarea id="poruka" name="poruka" rows="5" required style="width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 4px; resize: vertical;"></textarea>
                        </div>
                        <button type="submit" class="btn" style="cursor: pointer; align-self: flex-start;">Pošalji poruku</button>
                    </form>
                </div>
            </div>
        </div>
